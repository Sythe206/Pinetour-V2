  <body class="body">
    <main class="container">
      <section id="hero">
        <header class="container">
          <img src="/logo 1.png" alt="Logo" class="logo" />
          <div class="navContainer">
            <nav class="navText">Home</nav>
            <nav class="navText">About</nav>
            <nav class="navText">Contact</nav>
            <nav>
              <img src="/user.png" alt="user_icon" class="userIcon" />
            </nav>
          </div>
          <div class="languageChanger">EN</div>
        </header>
        <div class="heroTextContainer">
          <div class="heroSubtitle">PURE MAGIC</div>
          <div class="heroTitle">AWAITS!</div>
          <div class="heroYear">2024</div>
        </div>
      </section>
      <section id="journey">
        <div class="card cardOneImg">
          <p class="cardText">Terkhiin Tsagaan Lake</p>
        </div>
        <div class="card cardTwoImg">
          <p class="cardText">Amarbayasgalant Monastery</p>
        </div>
        <div class="card cardThreeImg">
          <p class="cardText height">khuvsgul lake</p>
        </div>
        <div class="card cardFourImg">
          <p class="cardText height">Khor</p>
        </div>
      </section>
